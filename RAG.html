<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>George Joy | Product Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #070b14;
      --card: rgba(14, 19, 34, 0.75);
      --line: rgba(255,255,255,0.08);
      --text: #e8eefc;
      --muted: #8fa0c7;
      --accent: #59d0ff;
      --accent2: #7c5cff;
      --green: #5dffb6;
      --shadow: 0 10px 40px rgba(0,0,0,0.45);
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(89,208,255,0.15), transparent 25%),
        linear-gradient(180deg, #05070d 0%, #0a1020 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: min(1200px, 92%);
      margin: auto;
      padding: 48px 0 80px;
      position: relative;
      z-index: 2;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 28px;
      align-items: stretch;
      margin-bottom: 28px;
    }

    .glass {
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero-card {
      padding: 42px;
    }

    .mini-card {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--accent);
